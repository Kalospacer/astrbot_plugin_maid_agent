name: astrbot_plugin_maid_agent
version: "1.1.0"
description: "大小姐+管家模式子代理系统：主模型仅保留自然语言对话上下文，所有工具调用通过管家subagent执行，减少结构化数据提示词污染角色扮演。"
author: "Kalo"
repo: "https://github.com/Kalospacer/astrbot_plugin_maid_agent"
display_name: "代理女仆"
astrbot_version: ">=4.20.0"
# ============================================================
# 依赖说明
# ============================================================
# 本插件需要配合 AstrBot 的 subagent 功能使用：
#
# 1. 必须在 AstrBot 配置中启用至少一个可用的 subagent
# 2. 插件实际调度目标由插件配置中的 `default_agent_name` /
#    `allowed_agent_names` 以及主模型对 `call_maid` 的调用参数一起决定
# 3. subagent 配置示例：
#    subagent_orchestrator:
#      agents:
#        - name: muiceagent
#          enabled: true
#          system_prompt: |
#            你是管家，负责处理大小姐转交的执行任务...
#          tools: null
#
# 详细配置说明请参考 README.md
# ============================================================

# 插件启用后的行为说明：
# 1. 主模型（大小姐）只看到自然语言对话历史，不直接持有工具
# 2. 主模型通过原生 `call_maid` Function Call 表达调度意图
# 3. `call_maid(action="dispatch")` 只登记后台任务，请求会在当前回复发送后投递执行
# 4. 插件在后台调度 subagent，并将执行结果回灌给大小姐
# 5. 管家 session 可在单 active 模式下跨轮持久化，直到完成或超时
